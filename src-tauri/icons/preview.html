<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Logo Preview</title>
<style>
  body { background: #f0f0f0; display: flex; gap: 40px; padding: 40px; align-items: flex-start; font-family: sans-serif; }
  .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.12); text-align: center; }
  .card h3 { margin: 12px 0 4px; font-size: 13px; color: #555; }
  .dark { background: #1a1a2e; }
  .dark h3 { color: #aaa; }
</style>
</head>
<body>
  <div class="card">
    <h3>白底预览 (512px)</h3>
    <img src="icon.png" width="128" height="128" style="display:block;margin:8px auto"/>
    <img src="icon.png" width="64" height="64" style="display:block;margin:8px auto"/>
    <img src="32x32.png" width="32" height="32" style="display:block;margin:8px auto"/>
    <h3>32 · 64 · 128</h3>
  </div>
  <div class="card dark">
    <h3>深色背景预览</h3>
    <img src="icon.png" width="128" height="128" style="display:block;margin:8px auto"/>
    <img src="icon.png" width="64" height="64" style="display:block;margin:8px auto"/>
  </div>
  <div class="card" style="background:#003DA5">
    <h3 style="color:white">蓝色背景</h3>
    <img src="icon.png" width="128" height="128" style="display:block;margin:8px auto"/>
  </div>
  <div class="card">
    <h3>SVG 原始（512px）</h3>
    <img src="lc-icon-source.svg" width="256" height="256" style="display:block;margin:8px auto"/>
  </div>
</body>
</html>
